# eBPF-capable kernel overlay for Apple `container` (arm64 / Apple Silicon)
#
# Merge this on top of an arm64 `defconfig` plus the kata-containers config
# fragments using `scripts/kconfig/merge_config.sh`, then run
# `make ARCH=arm64 olddefconfig`. It enables everything needed for modern eBPF
# work: BTF, the BPF JIT, struct_ops targets (sched_ext, BPF qdisc, TCP
# congestion ops), the full kprobe/uprobe/ftrace tracing stack, netem packet
# impairment, the BPF LSM with fmod_ret error injection, and AF_XDP socket maps.
#
# IMPORTANT: CONFIG_DEBUG_INFO_BTF needs a DWARF DEBUG_INFO *choice* selected and
# DEBUG_INFO_REDUCED disabled. `make olddefconfig` silently drops any symbol whose
# dependencies are unmet, so always grep the resulting .config to confirm the
# options below actually stuck -- BTF in particular, since the struct_ops targets
# depend on it and will silently fall out with it.

# --- Debug info via DWARF (prerequisite for BTF) ---
# CONFIG_DEBUG_INFO_NONE is not set
# CONFIG_DEBUG_INFO_REDUCED is not set
CONFIG_DEBUG_INFO_DWARF5=y

# --- BTF generation (DWARF -> BTF; needs pahole/dwarves at build time) ---
CONFIG_DEBUG_INFO_BTF=y
CONFIG_DEBUG_INFO_BTF_MODULES=y

# --- BPF core ---
CONFIG_BPF=y
CONFIG_BPF_SYSCALL=y
CONFIG_BPF_JIT=y
CONFIG_BPF_JIT_DEFAULT_ON=y
CONFIG_BPF_JIT_ALWAYS_ON=y
CONFIG_BPF_EVENTS=y
CONFIG_BPF_LSM=y
CONFIG_BPF_PRELOAD=y
CONFIG_USERMODE_DRIVER=y
CONFIG_BPF_STREAM_PARSER=y

# --- struct_ops targets ---
# sched_ext: write a CPU scheduler as a BPF struct_ops program.
CONFIG_SCHED_CLASS_EXT=y
# BPF qdisc: write a queueing discipline as a BPF struct_ops program (Linux 7.0+).
CONFIG_NET_SCH_BPF=y

# --- Tracing: kprobes / uprobes / ftrace (eBPF observability) ---
CONFIG_TRACEPOINTS=y
CONFIG_KPROBES=y
CONFIG_OPTPROBES=y
CONFIG_KPROBES_ON_FTRACE=y
CONFIG_UPROBES=y
CONFIG_KRETPROBES=y
CONFIG_KPROBE_EVENTS=y
CONFIG_UPROBE_EVENTS=y
CONFIG_FPROBE=y
CONFIG_FTRACE=y
CONFIG_FUNCTION_TRACER=y
CONFIG_FUNCTION_GRAPH_TRACER=y
CONFIG_DYNAMIC_FTRACE=y
CONFIG_FTRACE_SYSCALLS=y

# --- Networking extras ---
CONFIG_NETFILTER_XT_MATCH_BPF=y

# --- Packet impairment (netem) for latency / loss testing ---
# Needed by e.g. `tc qdisc add dev lo root netem loss 5%`.
CONFIG_NET_SCHED=y
CONFIG_NET_SCH_NETEM=y
# Classful qdiscs netem is commonly attached under, plus the modern default.
CONFIG_NET_SCH_PRIO=y
CONFIG_NET_SCH_TBF=y
CONFIG_NET_SCH_FQ_CODEL=y
# Packet classifiers used by tc test harnesses.
CONFIG_NET_CLS_U32=y
CONFIG_NET_CLS_BPF=y

# --- BPF LSM enforcement + fmod_ret error injection ---
# A bpf LSM program (SEC("lsm/<hook>")) loads and attaches without these, but it
# never fires unless `bpf` is present in the active lsm= list; fmod_ret needs
# FUNCTION_ERROR_INJECTION for there to be any attachable targets at all.
CONFIG_FUNCTION_ERROR_INJECTION=y
CONFIG_BPF_KPROBE_OVERRIDE=y
#
# The container runtime passes its own lsm= on the kernel command line, which
# overrides CONFIG_LSM and (by default) does NOT include bpf. arm64 has no
# CMDLINE_EXTEND -- only FROM_BOOTLOADER or FORCE -- so to add `bpf` we FORCE the
# FULL runtime command line verbatim with `,bpf` appended to lsm=. Every other
# token (console= / init= / root= / rootfstype=) must match what the runtime
# actually boots with, or the guest will not start.
#
# >>> VERIFY BEFORE USE <<<  Run `container exec <some-container> cat /proc/cmdline`
# and make the line below match it exactly, only adding `,bpf` to lsm=. If the
# runtime ever changes its command line, a stale forced value here bricks the boot.
# If you do not need the BPF LSM, delete the two CMDLINE lines below (and you can
# drop FUNCTION_ERROR_INJECTION / BPF_KPROBE_OVERRIDE too).
CONFIG_CMDLINE_FORCE=y
CONFIG_CMDLINE="console=hvc0 tsc=reliable panic=0 oops=panic lsm=lockdown,capability,landlock,yama,apparmor,bpf init=/sbin/vminitd ro rootfstype=ext4 root=/dev/vda"

# --- AF_XDP socket maps (XSKMAP) ---
# Without XDP_SOCKETS, creating a BPF_MAP_TYPE_XSKMAP fails with -EINVAL and an
# XDP program that uses xsk_redirect won't load. (Zero-copy AF_XDP additionally
# needs a userspace socket bound to a NIC queue -- out of scope here; this just
# enables map creation + program load.)
CONFIG_XDP_SOCKETS=y
CONFIG_XDP_SOCKETS_DIAG=y
